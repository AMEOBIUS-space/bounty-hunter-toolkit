name: "bounty-hunter-toolkit"
description: "Scan code for security vulnerabilities and upload SARIF results to GitHub Security"
author: "AMEOBIUS-team"
branding:
  icon: "shield"
  color: "red"

inputs:
  path:
    description: "Directory to scan"
    required: false
    default: "."
  sarif-output:
    description: "Output SARIF file path"
    required: false
    default: "bounty-hunter-results.sarif"

runs:
  using: "composite"
  steps:
    - name: Install bounty-hunter-toolkit
      shell: bash
      run: pip install bounty-hunter-toolkit

    - name: Scan code
      shell: bash
      run: |
        python -m sarif_export scan --directory "${{ inputs.path }}" --output "${{ inputs.sarif-output }}"
        echo "sarif_path=${{ inputs.sarif-output }}" >> $GITHUB_OUTPUT

    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}
